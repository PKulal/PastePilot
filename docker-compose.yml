version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: pastebin-postgres
    environment:
      POSTGRES_USER: pastebin_user
      POSTGRES_PASSWORD: pastebin_password
      POSTGRES_DB: pastebin_pro
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: pastebin-redis
    ports:
      - "6380:6379"

volumes:
  pgdata:
